<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jasleen's Bakery — Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    

  <div id="transition-veil"></div>

  <header>
   
    
  </header>

  <section class="tray-section">
    <div class="tray-wrapper">
      <img src="images/macaroons/tray.png" alt="baking tray" class="tray-img">
      <div class="macaroon-grid">

        <div class="macaroon-item" data-id="pink" data-page="interactivities.html">
          <img src="images/macaroons/pink0.png" alt="Interactivities macaroon" class="macaroon-img" id="pink">
          <div class="progress-dots">
            <span id="pink-d0"></span>
            <span id="pink-d1"></span>
            <span id="pink-d2"></span>
            <span id="pink-d3"></span>
            <span id="pink-d4"></span>
            <span id="pink-d5"></span>
          </div>
          <p class="macaroon-label"></p>
        </div>

        <div class="macaroon-item" data-id="purple" data-page="experiments.html">
          <img src="images/macaroons/purple0.png" alt="Experiments macaroon" class="macaroon-img" id="purple">
          <div class="progress-dots">
            <span id="purple-d0"></span>
            <span id="purple-d1"></span>
            <span id="purple-d2"></span>
            <span id="purple-d3"></span>
            <span id="purple-d4"></span>
            <span id="purple-d55"></span>
          </div>
          <p class="macaroon-label"></p>
        </div>

        <div class="macaroon-item" data-id="blue" data-page="process.html">
          <img src="images/macaroons/blue0.png" alt="Process macaroon" class="macaroon-img" id="blue">
          <div class="progress-dots">
            <span id="blue-d0"></span>
            <span id="blue-d1"></span>
            <span id="blue-d2"></span>
            <span id="blue-d3"></span>
            <span id="blue-d4"></span>
            <span id="blue-d5"></span>
          </div>
          <p class="macaroon-label"></p>
        </div>

        <div class="macaroon-item" data-id="yellow" data-page="glossary.html">
          <img src="images/macaroons/yellow0.png" alt="Glossary macaroon" class="macaroon-img" id="yellow">
          <div class="progress-dots">
            <span id="yellow-d0"></span>
            <span id="yellow-d1"></span>
            <span id="yellow-d2"></span>
            <span id="yellow-d3"></span>
            <span id="yellow-d4"></span>
            <span id="yellow-d5"></span>
          </div>
          <p class="macaroon-label"></p>
        </div>

      </div>
    </div>
  </section>

  <main>
    <img src="images/content/logo.png" alt="Jasleen's Bakery" class="logo-stamp">
  </main>


  <audio id="munch-audio" preload="auto">
    <source src="audio/munch.mp3" type="audio/mpeg">
  </audio>

  <script src="main.js"></script>

</body>
</html>
