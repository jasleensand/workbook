<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Petite Miette — Process</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="process-page">

  <a href="index.html" class="home-btn">
    <img src="images/content/home.png" alt="home">
  </a>

  <main class="process-main">
    <div class="cards-grid">

      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="images/content/process/cookieface.png" alt="Cookie Clicker">
          </div>
          <div class="flip-card-back">
            <img src="images/content/process/cookiecard.png" alt="Cookie Clicker Case Study">
          </div>
        </div>
      </div>

      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="images/content/process/memoryface.png" alt="Memory Card Game">
          </div>
          <div class="flip-card-back">
            <img src="images/content/process/memorycard.png" alt="Memory Card Game Case Study">
          </div>
        </div>
      </div>

      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="images/content/process/pastryface.png" alt="Black Star Pastry">
          </div>
          <div class="flip-card-back">
            <img src="images/content/process/pastrycard.png" alt="Black Star Pastry Case Study">
          </div>
        </div>
      </div>

    </div>
  </main>

 

  <script src="main.js"></script>

</body>
</html>
