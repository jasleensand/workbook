<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jasleen's Bakery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="interactivities-page">

  <a href="index.html" class="home-btn">
    <img src="images/content/home.png" alt="home">
  </a>

  <div class="table-bg">
    <img src="images/content/interactivities/table.png" alt="" class="table-img">
    <img src="images/content/interactivities/string.png" alt="" class="string-img">

    <div class="card-stack" id="cardStack">

      <div class="recipe-card" id="card-crazy"
  style="--rot: -6deg; --tx: 0px; --ty: 0px; z-index: 1;">
  <img src="images/content/interactivities/crazycard.png" alt="Crazy Eights">
</div>

<div class="recipe-card" id="card-relay"
  style="--rot: -3deg; --tx: 0px; --ty: 0px; z-index: 2;">
  <img src="images/content/interactivities/relaycard.png" alt="Tag Relay">
</div>

<div class="recipe-card" id="card-stitch"
  style="--rot: 0deg; --tx: 0px; --ty: 0px; z-index: 3;">
  <img src="images/content/interactivities/stitchcard.png" alt="Stitch AI">
</div>

<div class="recipe-card" id="card-hour"
  style="--rot: 3deg; --tx: 0px; --ty: 0px; z-index: 4;">
  <img src="images/content/interactivities/hourcard.png" alt="12 Hour Challenge">
</div>

<div class="recipe-card" id="card-paper"
  style="--rot: 6deg; --tx: 0px; --ty: 0px; z-index: 5;">
  <img src="images/content/interactivities/papercard.png" alt="Paper Prototyping">
</div>

    </div>
  </div>

  <script src="main.js"></script>
  <script src="interactivities.js"></script>

</body>
</html>
